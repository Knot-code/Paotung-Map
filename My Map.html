<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแผนที่สาขาแฟรนไชส์ - เป๋าตุงฟู้ดส์</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        /* จัดเลย์เอาต์แบ่งซ้าย-ขวา */
        #main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 64px);
            overflow: hidden;
        }
        /* แถบข้างแสดงข้อมูลและจำนวนสาขา */
        #sidebar {
            width: 320px;
            background-color: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 999;
        }
        .branch-counter {
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        .branch-list {
            overflow-y: auto;
            flex: 1;
        }
        .branch-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .branch-item:hover {
            background-color: #eaeaea;
        }
        .branch-item h4 {
            margin: 0 0 5px 0;
            color: #2c3e50;
        }
        .branch-item p {
            margin: 0;
            font-size: 13px;
            color: #555;
            line-height: 1.4;
        }
        /* พื้นที่แสดงแผนที่ */
        #map {
            flex: 1;
            height: 100%;
        }
        /* แต่งหน้าต่าง Popup บนแผนที่ */
        .popup-content h3 {
            margin: 0 0 5px 0;
            color: #e74c3c;
        }
        .popup-content p {
            margin: 5px 0;
            font-size: 14px;
        }

        /* รองรับการแสดงผลบนมือถือ */
        @media (max-width: 768px) {
            #main-container {
                flex-direction: column-reverse;
            }
            #sidebar {
                width: 100%;
                height: 40%;
            }
            #map {
                height: 60%;
            }
        }
    </style>
</head>
<body>

    <div id="header">แผนที่สาขาแฟรนไชส์เป๋าตุงฟู้ดส์</div>
    
    <div id="main-container">
        <div id="sidebar">
            <div class="branch-counter" id="total-branches">กำลังโหลดสาขา...</div>
            <div class="branch-list" id="list-container"></div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. ตั้งค่าเริ่มต้นแผนที่ซูมไปที่ใจกลางประเทศไทย
        var map = L.map('map').setView([13.736717, 100.523186], 6);

        // 2. ดึงแผนที่จาก OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. ข้อมูลสาขา (สามารถมาเพิ่ม-ลด หรือแก้ไขตรงนี้ได้เลย ระบบจะคำนวณจำนวนให้เองอัตโนมัติ)
        var branches = [
            {
                name: "สาขาหลัก (กรุงเทพฯ)",
                desc: "เปิดบริการ: 09:00 - 20:00 น.<br>โทร: 02-xxx-xxxx",
                coords: [13.7563, 100.5018]
            },
            {
                name: "สาขาเชียงใหม่",
                desc: "เปิดบริการ: 10:00 - 21:00 น.<br>โทร: 053-xxx-xxxx",
                coords: [18.7883, 98.9853]
            },
            {
                name: "สาขาขอนแก่น",
                desc: "เปิดบริการ: 09:30 - 19:30 น.<br>โทร: 043-xxx-xxxx",
                coords: [16.4322, 102.8236]
            },
            {
                name: "สาขาหาดใหญ่",
                desc: "เปิดบริการ: 10:00 - 22:00 น.<br>โทร: 074-xxx-xxxx",
                coords: [7.0084, 100.4746]
            }
        ];

        // 4. อัปเดตตัวเลขจำนวนสาขารวมบนหน้าเว็บ
        document.getElementById('total-branches').innerText = `ทั้งหมด ${branches.length} สาขาทั่วประเทศ`;

        var listContainer = document.getElementById('list-container');

        // 5. วนลูปสร้างทั้งหมุดบนแผนที่ และรายชื่อในแถบด้านข้าง
        branches.forEach(function(branch, index) {
            // --- ส่วนของแผ่นที่ ---
            var marker = L.marker(branch.coords).addTo(map);
            var popupContent = `
                <div class="popup-content">
                    <h3>${branch.name}</h3>
                    <p>${branch.desc}</p>
                </div>
            `;
            marker.bindPopup(popupContent);

            // --- ส่วนของแถบรายชื่อด้านข้าง ---
            var branchItem = document.createElement('div');
            branchItem.className = 'branch-item';
            branchItem.innerHTML = `
                <h4>${branch.name}</h4>
                <p>${branch.desc}</p>
            `;
            
            // เมื่อลูกค้าคลิกที่ชื่อสาขาด้านข้าง -> ให้แผนที่เลื่อนไปหาและเปิดกล่องข้อมูล
            branchItem.addEventListener('click', function() {
                map.setView(branch.coords, 14); // เลื่อนแผ่นที่ไปที่พิกัดสาขา และซูมระดับ 14
                marker.openPopup(); // เปิดหน้าต่างข้อมูลสาขานั้นๆ
            });

            listContainer.appendChild(branchItem);
        });
    </script>
</body>
</html>
